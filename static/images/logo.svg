<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="b8">
      <circle cx="50" cy="50" r="44"/>
    </clipPath>
  </defs>

  <style>
    /* ↓ CHANGE THIS to rotate seams */
    :root { --rot: 270deg; }

    .seams {
      transform-origin: 50px 50px;
      transform: rotate(var(--rot));
    }
  </style>

  <!-- Ball fill -->
  <circle cx="50" cy="50" r="46" fill="#C4E800"/>

  <!-- Seams (behind bars) -->
  <g class="seams" fill="none" stroke="#1C3200" stroke-width="8" stroke-linecap="round"
     opacity="0.7" clip-path="url(#b8)">
    <path d="M 72,12 C 95,32 48,52 72,88"/>
    <!-- <path d="M 28,12 C 5,32 52,52 28,88"/> -->
  </g>

  <!-- 3 bars with outlines — left medium, middle tallest, right medium-tall -->
  <g clip-path="url(#b8)">
    <rect x="14" y="50" width="20" height="100" rx="2"
          fill="#2B5BE8" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
    <rect x="40" y="18" width="20" height="100" rx="2"
          fill="#7C2FC9" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
    <rect x="66" y="37" width="20" height="100" rx="2"
          fill="#E05B2B" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
  </g>

  <g class="seams" fill="none" stroke="#1C3200" stroke-width="8" stroke-linecap="round"
     opacity="0.6" clip-path="url(#b8)">
    <!-- <path d="M 72,12 C 95,32 48,52 72,88"/> -->
    <path d="M 28,12 C 5,32 52,52 28,88"/>
  </g>

  <!-- Ball border -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#5A7800" stroke-width="1.5" opacity="0.35"/>
</svg>
