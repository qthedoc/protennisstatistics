name: Refresh ranking data

# Scheduled, no-DB refresh: runs the tournament-centric ETL and commits the updated
# snapshots + archive. Finished tournaments are cached, so most runs fetch only the
# current week's events. Requires repo secret RAPIDAPI_KEY.

on:
  schedule:
    - cron: '0 6 * * 1' # monday @ 06:00 UTC
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build snapshots
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: pnpm tsx scripts/refresh-data.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data
          if git diff --staged --quiet; then
            echo "no data changes"
          else
            git commit -m "chore(data): refresh rankings $(date -u +%Y-%m-%d)"
            git push
          fi
